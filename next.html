<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindspace Engine - Build4Students</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
  body{
    background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;display:flex;justify-content:center;align-items:center;
    padding:20px;color:#fff
  }
  .container{
    background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);
    border-radius:25px;padding:35px;width:100%;max-width:450px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2)
  }
  h1{text-align:center;margin-bottom:10px;font-size:28px}
  .tagline{text-align:center;opacity:0.8;font-size:14px;margin-bottom:30px}
 
  .timer-box{text-align:center;margin:30px 0}
  #time{font-size:70px;font-weight:700;letter-spacing:3px}
  .mode{margin-top:8px;opacity:0.9;font-size:16px}
 
  .btns{display:flex;gap:12px;justify-content:center;margin:25px 0}
  button{
    padding:12px 22px;border:none;border-radius:12px;font-size:16px;
    font-weight:600;cursor:pointer;transition:0.2s;background:#fff;color:#764ba2
  }
  button:hover{transform:scale(1.05)}
  button:active{transform:scale(0.98)}
  #reset{background:rgba(255,255,255,0.2);color:#fff}
 
  .progress{
    height:8px;background:rgba(255,255,255,0.2);border-radius:10px;overflow:hidden;margin:20px 0
  }
  #bar{height:100%;width:100%;background:#fff;transition:width 1s linear}
 
  .notes{
    margin-top:25px
  }
  .notes h3{margin-bottom:10px;font-size:18px}
  textarea{
    width:100%;height:120px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);
    border-radius:12px;padding:12px;color:#fff;font-size:15px;resize:none;outline:none
  }
  textarea::placeholder{color:rgba(255,255,255,0.6)}
 
  .sessions{text-align:center;margin-top:15px;opacity:0.9;font-size:14px}
</style>
</head>
<body>

<div class="container">
  <h1>🧠 Mindspace</h1>
  <p class="tagline">Build4Students - Focus Engine</p>
 
  <div class="timer-box">
    <div id="time"></div>
    <div class="mode" id="mode">Focus Mode</div>
  </div>
 
  <div class="progress"><div id="bar"></div></div>
 
  <div class="btns">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
  </div>
 
  <div class="notes">
    <h3>📝 Quick Notes</h3>
    <textarea id="note" placeholder="Formula ya point yahan likh lo... auto save ho jayega"></textarea>
  </div>
 
  <div class="sessions">Sessions Completed: <span id="count">0</span></div>
</div>

<script>
    
const timeEl = document.getElementById('time');
const modeEl = document.getElementById('mode');
const startBtn = document.getElementById('start');
const pauseBtn = document.getElementById('pause');
const resetBtn = document.getElementById('reset');
const bar = document.getElementById('bar');
const note = document.getElementById('note');
const countEl = document.getElementById('count');

let x = prompt("how much time")

let focusTime = x * 60; // 25 min
let breakTime = 5 * 60;  // 5 min
let timeLeft = focusTime;
let isFocus = true;
let timer = null;
let isRunning = false;
let sessions = localStorage.getItem('sessions') || 0;
countEl.textContent = sessions;

// Load saved note
note.value = localStorage.getItem('mindspace_note') || '';
note.addEventListener('input', () => {
  localStorage.setItem('mindspace_note', note.value);
});

function updateDisplay() {
  let min = Math.floor(timeLeft / 60);
  let sec = timeLeft % 60;
  timeEl.textContent = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
 
  let total = isFocus ? focusTime : breakTime;
  bar.style.width = ((timeLeft / total) * 100) + '%';
}

function switchMode() {
  isFocus = !isFocus;
  timeLeft = isFocus ? focusTime : breakTime;
  modeEl.textContent = isFocus ? 'Focus Mode' : 'Break Mode';
  document.body.style.background = isFocus
    ? 'linear-gradient(135deg,#667eea 0%,#764ba2 100%)'
    : 'linear-gradient(135deg,#f093fb 0%,#f5576c 100%)';
 
  if(isFocus) {
    sessions++;
    localStorage.setItem('sessions', sessions);
    countEl.textContent = sessions;
  }
 
  // Beep sound
  new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZURE").play();
}

function start() {
  if(!isRunning) {
    isRunning = true;
    timer = setInterval(() => {
      timeLeft--;
      updateDisplay();
      if(timeLeft <= 0) switchMode();
    }, 1000);
  }
}

function pause() {
  isRunning = false;
  clearInterval(timer);
}

function reset() {
  pause();
  isFocus = true;
  timeLeft = focusTime;
  modeEl.textContent = 'Focus Mode';
  document.body.style.background = 'linear-gradient(135deg,#667eea 0%,#764ba2 100%)';
  updateDisplay();
}

startBtn.onclick = start;
pauseBtn.onclick = pause;
resetBtn.onclick = reset;

updateDisplay();
</script>
</body>
</html>

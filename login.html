<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OceanFocus Login</title>
<style>
 
  *{
    margin:0;
    padding:0;box-sizing:border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  }
 
  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #0f172a, #1e293b, #312e81, #1e3a8a);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    overflow:hidden;
  }
 
  @keyframes gradientBG {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }
 
  /* Floating particles background */
  .particles span{
    position:absolute;
    display:block;
    width:20px;
    height:20px;
    background:rgba(96,165,250,0.3);border-radius:50%;
    animation: float 20s infinite ease-in-out;
  }
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(0deg)}
    50%{transform:translateY(-1000px) rotate(720deg)}
  }
 
  .auth-wrapper{
    position:relative;
    z-index:10;
    width:100%;
    max-width:420px;
    animation: slideUp 0.6s ease-out;
  }
  @keyframes slideUp{
    from{opacity:0;transform:translateY(40px)}
    to{opacity:1;transform:translateY(0)}
  }
 
  .auth-card{
    background:rgba(15,23,42,0.7);
    backdrop-filter:blur(25px);
    border:1px solid rgba(148,163,184,0.2);border-radius:24px;
    padding:45px 35px;
    box-shadow:0 25px 80px rgba(0,0,0,0.6);
  }
 
  .logo{
    text-align:center;
    margin-bottom:30px
}
  .logo h1{
    font-size:32px;
    font-weight:700;
    color: white;

}
  .logo p{
    color:#94a3b8;
    font-size:14px;
    margin-top:5px;
}
 
  .tabs{
    display:flex;
    background:rgba(30,41,59,0.6);
    border-radius:12px;
    padding:5px;
    margin-bottom:30px;
}
  .tab{
    flex:1;
    padding:12px;
    border:none;
    background:transparent;
    color:#cbd5e1;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
    position:relative;
  }
  .tab.active{color:#fff}
  .tab.active::after{
    content:'';position:absolute;inset:0;background:#3b82f6;border-radius:8px;z-index:-1;
    animation: tabSlide 0.3s ease
  }
  @keyframes tabSlide{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
 
  .input-group{position:relative;margin-bottom:22px}
  .input-group input{
    width:100%;padding:16px 50px 16px 16px;border-radius:12px;
    border:2px solid rgba(148,163,184,0.2);background:rgba(15,23,42,0.6);
    color:#e2e8f0;font-size:15px;transition:0.3s;outline:none
  }
  .input-group input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 0 4px rgba(59,130,246,0.1)
}
  .input-group label{
    position:absolute;
    left:16px;
    top:16px;
    color:#94a3b8;
    transition:0.3s;
    background:transparent;
    padding:0 5px;
  }
  .input-group input:focus + label,
  .input-group input:valid + label{
    top:-10px;
    left:12px;
    font-size:12px;
    color:#60a5fa;
    background:rgba(15,23,42,0.9);
  }
  .input-icon{
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);
    color:#64748b;
    font-size:18px;
  }
 
  .submit-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#3b82f6,#8b5cf6);color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 8px 25px rgba(59,130,246,0.4);
  }
  .submit-btn:hover{transform:translateY(-2px);
    box-shadow:0 12px 35px rgba(59,130,246,0.6);
}
  .submit-btn:active{transform:translateY(0);}
 
  .alert{
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    display:none;
    animation:shake 0.4s;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-10px)}
    75%{transform:translateX(10px)}
  }
  .alert.error{
    background:rgba(239,68,68,0.2);
    border:1px solid #ef4444;
    color:#fca5a5;
}
  .alert.success{
    background:rgba(34,197,94,0.2);
    border:1px solid #22c55e;
    color:#86efac;
}
 
  .strength-bar{
    height:4px;
    background:rgba(148,163,184,0.2);
    border-radius:2px;
    margin-top:8px;
    overflow:hidden;
}
  .strength-fill{
    height:100%;
    width:0%;
    transition:0.3s;
    border-radius:2px;
}
 
  #appContainer{
    display:none
}
  .user-badge{
    position:absolute;
    top:25px;
    right:30px;
    display:flex;
    align-items:center;
    gap:12px;
    background:rgba(30,41,59,0.8);
    padding:10px 18px;
    border-radius:50px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(148,163,184,0.2);
  }
  .logout-btn{
    padding:8px 16px;
    background:#ef4444;
    border:none;
    border-radius:8px;
    color:#fff;
    cursor:pointer;
    font-weight:600;
    transition:0.2s;
}
  .logout-btn:hover{
    background:#dc2626;
    }
</style>
</head>
<body>

<!-- Animated Background -->
<div class="particles">
  <span style="left:10%;animation-delay:0s"></span>
  <span style="left:20%;animation-delay:2s"></span>
  <span style="left:35%;animation-delay:4s"></span>
  <span style="left:50%;animation-delay:1s"></span>
  <span style="left:70%;animation-delay:3s"></span>
  <span style="left:85%;animation-delay:5s"></span>
</div>

<!-- AUTH SCREEN -->
<div class="auth-wrapper" id="authScreen">
  <div class="auth-card">
    <div class="logo">
      <h1>OceanFocus</h1>
      <p>Build4Students - Focus Better</p>
    </div>
   
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>
   
    <div id="alert" class="alert"></div>
   
    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <input type="text" id="loginUser" required autocomplete="username">
        <label>Username</label>
        <span class="input-icon">👤</span>
      </div>
      <div class="input-group">
        <input type="password" id="loginPass" required autocomplete="current-password">
        <label>Password</label>
        <span class="input-icon">🔒</span>
      </div>
      <button type="submit" class="submit-btn">Login & Start Focusing</button>
    </form>
   
    <!-- SIGNUP FORM -->
    <form id="signupForm" style="display:none" onsubmit="handleSignup(event)">
      <div class="input-group">
        <input type="text" id="signupUser" required minlength="3" autocomplete="username">
        <label>Choose Username</label>
        <span class="input-icon">✨</span>
      </div>
      <div class="input-group">
        <input type="password" id="signupPass" required minlength="6" autocomplete="new-password" oninput="checkStrength()">
        <label>Create Password</label>
        <span class="input-icon">🔐</span>
        <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
      </div>
      <div class="input-group">
        <input type="password" id="signupPass2" required autocomplete="new-password">
        <label>Confirm Password</label>
        <span class="input-icon">✓</span>
      </div>
      <button type="submit" class="submit-btn">Create Account</button>
    </form>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appContainer" style="width:100%">
  <div class="user-badge">
    <span id="welcomeUser">Hi, User</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
  

  <div style="padding:100px 20px;text-align:center">
    <h1 style="font-size:40px;color:#e2e8f0">Welcome to OceanFocus Pro ✅</h1>
    <p style="color:#94a3b8;margin-top:15px">Ab apna timer aur tasks use kar</p>
  </div>
</div>

<script>
let currentUser = null;

function showAlert(msg, type) {
  const alert = document.getElementById('alert');
  alert.textContent = msg;
  alert.className = `alert ${type}`;
  alert.style.display = 'block';
  setTimeout(() => alert.style.display = 'none', 3000);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
 
  if(tab === 'login') {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('signupForm').style.display = 'none';
  } else {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('signupForm').style.display = 'block';
  }
  document.getElementById('alert').style.display = 'none';
}

function checkStrength() {
  const pass = document.getElementById('signupPass').value;
  const fill = document.getElementById('strengthFill');
  let strength = 0;
 
  if(pass.length >= 6) strength += 25;
  if(pass.match(/[a-z]/) && pass.match(/[A-Z]/)) strength += 25;
  if(pass.match(/[0-9]/)) strength += 25;
  if(pass.match(/[^a-zA-Z0-9]/)) strength += 25;
 
  fill.style.width = strength + '%';
  fill.style.background = strength < 50 ? '#ef4444' : strength < 75 ? '#f59e0b' : '#22c55e';
}

function handleSignup(e) {
  e.preventDefault();
  const user = document.getElementById('signupUser').value.trim();
  const pass = document.getElementById('signupPass').value;
  const pass2 = document.getElementById('signupPass2').value;
 
  if(user.length < 3) return showAlert('Username should be atleast 4 characters long', 'error');
  if(pass.length < 6) return showAlert('Password must consist of 6+ characters', 'error');
  if(pass !== pass2) return showAlert('Password does not match', 'error');
  if(localStorage.getItem('user_' + user)) return showAlert('Username has already been taken', 'error');
 
  localStorage.setItem('user_' + user, btoa(pass));
  localStorage.setItem(user + '_sessions', '0');
  localStorage.setItem(user + '_tasks', '[]');
  localStorage.setItem(user + '_focusTime', '1500');
 
  showAlert('Account has created no login', 'success');
  setTimeout(() => switchTab('login'), 1500);
}

function handleLogin(e) {
  e.preventDefault();
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
 
  const savedPass = localStorage.getItem('user_' + user);
  if(!savedPass) return showAlert('Username does not match', 'error');
  if(savedPass !== btoa(pass)) return showAlert('Password does not match', 'error');
 
  currentUser = user;
  localStorage.setItem('currentUser', user);
 
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appContainer').style.display = 'block';
  document.getElementById('welcomeUser').textContent = 'Hi, ' + user;
 
  loadUserData();
}

function logout() {
  saveUserData();
  currentUser = null;
  localStorage.removeItem('currentUser');
  document.getElementById('authScreen').style.display = 'block';
  document.getElementById('appContainer').style.display = 'none';
  document.getElementById('loginPass').value = '';
}

// Auto login
window.onload = () => {
  const savedUser = localStorage.getItem('currentUser');
  if(savedUser) {
    currentUser = savedUser;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    document.getElementById('welcomeUser').textContent = 'Hi, ' + savedUser;
    loadUserData();
  }
}


</script>
</body>
</html>

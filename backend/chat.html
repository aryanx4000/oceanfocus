<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <style>
   
    :root {
    --bg-main: #1e1e2e;
    --bg-sidebar: #181825;
    --bg-message-bot: #252538;
    --bg-message-user: #313244;
    --text-main: #cdd6f4;
    --text-muted: #7f849c;
    --accent: #cba6f7;
    --accent-hover: #b4befe;
    --border-color: #45475a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    height: 100vh;
    display: flex;
}

.container {
    display: flex;
    width: 100%;
    height: 100%;
}

/* Sidebar Styling */
.sidebar {
    width: 260px;
    background-color: var(--bg-sidebar);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border-color);
}

.new-chat-btn {
    background: transparent;
    color: var(--text-main);
    border: 1px solid var(--border-color);
    padding: 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    font-size: 0.9rem;
    transition: background 0.2s;
}

.new-chat-btn:hover {
    background: var(--bg-message-user);
}

.chat-history {
    margin-top: 1.5rem;
}

.history-title {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    padding-left: 0.5rem;
}

.chat-history ul {
    list-style: none;
}

.chat-history li {
    padding: 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 10px;
}

.chat-history li:hover, .chat-history li.active {
    background: var(--bg-message-bot);
}

/* Chat Area Styling */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
}

.chat-header {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-main);
}

.messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

/* Message Bubbles */
.message {
    display: flex;
    gap: 1rem;
    max-width: 80%;
    align-self: flex-start;
    animation: fadeIn 0.3s ease;
}

.message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
}

.avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg-sidebar);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.message.user .avatar {
    background: var(--text-muted);
    color: var(--bg-main);
}

.message-content {
    padding: 0.8rem 1.2rem;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 0.95rem;
    word-break: break-word;
}

.message.bot .message-content {
    background-color: var(--bg-message-bot);
}

.message.user .message-content {
    background-color: var(--bg-message-user);
}

/* Typing Indicator Animation */
.typing-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.4s infinite ease-in-out both;
    margin-right: 3px;
}

.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }

/* Input Footer */
.chat-footer {
    padding: 1.5rem 2rem;
    background: var(--bg-main);
}

.input-container {
    max-width: 800px;
    margin: 0 auto;
    position: relative;
    display: flex;
    align-items: center;
    background: var(--bg-message-bot);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 0.5rem 1rem;
}

.input-container input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-main);
    padding: 0.5rem;
    font-size: 1rem;
}

.input-container input:focus {
    outline: none;
}

.input-container button {
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0.5rem;
    transition: color 0.2s;
}

.input-container button:hover {
    color: var(--accent-hover);
}

/* Scrollbar tweaks */
.messages-container::-webkit-scrollbar {
    width: 6px;
}
.messages-container::-webkit-scrollbar-thumb {
    background: var(--border-color);
    border-radius: 3px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1.0); }
}

/* Responsive design */
@media (max-width: 768px) {
    .sidebar { display: none; }
    .message { max-width: 90%; }
    .chat-footer { padding: 1rem; }
}

       
    </style>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <button class="new-chat-btn"><i class="fa-solid fa-plus"></i> New Chat</button>
            <div class="chat-history">
                <p class="history-title">Recent Chats</p>
                <ul>
                    <li class="active"><i class="fa-regular fa-message"></i> AI Interface Design</li>
                    <li><i class="fa-regular fa-message"></i> JavaScript Help</li>
                </ul>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h2>AI Assistant</h2>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="message bot">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="message-content">
                        Hello! How can I help you today?
                    </div>
                </div>
            </div>

            <footer class="chat-footer">
                <form id="chatForm" class="input-container">
                    <input type="text" id="userInput" placeholder="Message AI Assistant..." autocomplete="off" required>
                    <button type="submit" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </footer>
        </main>
    </div>

    <script>
        document.getElementById('chatForm').addEventListener('submit', async function(e) {

    e.preventDefault();

    const inputField = document.getElementById('userInput');

    const userMessage = inputField.value.trim();

    if (!userMessage) return;

    appendMessage(userMessage, 'user');

    inputField.value = '';

    const typingIndicatorElement = appendTypingIndicator();

    try {

        const response = await fetch('http://localhost:5500/chat', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                message: userMessage
            })
        });

        const data = await response.json();

        typingIndicatorElement.remove();

        appendMessage(data.reply, 'bot');

    } catch (error) {

        typingIndicatorElement.remove();

        appendMessage("Failed to connect to AI server.", 'bot');

        console.log(error);
    }
});

function appendMessage(text, sender) {

    const container = document.getElementById('messagesContainer');

    const messageDiv = document.createElement('div');

    messageDiv.classList.add('message', sender);

    const avatarHTML = sender === 'bot'
        ? `<div class="avatar"><i class="fa-solid fa-robot"></i></div>`
        : `<div class="avatar"><i class="fa-solid fa-user"></i></div>`;

    messageDiv.innerHTML = `
        ${avatarHTML}
        <div class="message-content">${text}</div>
    `;

    container.appendChild(messageDiv);

    scrollToBottom();
}

function appendTypingIndicator() {

    const container = document.getElementById('messagesContainer');

    const indicatorDiv = document.createElement('div');

    indicatorDiv.classList.add('message', 'bot');

    indicatorDiv.innerHTML = `
        <div class="avatar"><i class="fa-solid fa-robot"></i></div>

        <div class="message-content">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
        </div>
    `;

    container.appendChild(indicatorDiv);

    scrollToBottom();

    return indicatorDiv;
}

function scrollToBottom() {

    const container = document.getElementById('messagesContainer');

    container.scrollTop = container.scrollHeight;
}
    </script>
</body>
</html>
